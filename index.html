<body class="text-gray-900">

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ===== Supabase（任意）=====
   自社Supabaseの「Project URL」と「anon(publishable)公開キー」を貼ると、
   ログイン必須＋クラウド保存＋写真/ PDFアップロード＋LINE自動送信 が有効になります。
   空のままだとログイン無し・ブラウザ保存のみ（PDFは端末で共有/保存）。 */
const SUPABASE_URL  = ''; // 例: https://xxxx.supabase.co
const SUPABASE_ANON = ''; // 例: sb_publishable_xxx（publishable 公開キーのみ。service_roleは絶対に貼らない）
const ADMIN_EMAIL   = 't_suzuki@dart-ace.com'; // アカウント発行依頼のmailto先（自己登録は不可）

const AUTH_ENABLED = /^https?:\/\//.test(SUPABASE_URL) && SUPABASE_ANON.length > 20;
const supa = AUTH_ENABLED && window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const STORAGE_BUCKET = 'reports'; // Supabase Storage のバケット名（公開バケット）

/* ---------- 永続化（localStorage・キー接頭辞 ssr_）---------- */
const load = (k, d) => { try { const v = localStorage.getItem('ssr_'+k); return v ? JSON.parse(v) : d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem('ssr_'+k, JSON.stringify(v)); } catch {} };

/* ---------- マスタ初期値 ---------- */
const DEFAULT_CATEGORIES = ['グリストラップ清掃','フィルター清掃','エアコン清掃','厨房清掃','排水溝清掃','その他'];

/* ---------- 小物 ---------- */
const uid = () => (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).slice(2);
const pad = n => String(n).padStart(2, '0');
const nowLocalInput = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const fmtDate = iso => { if (!iso) return ''; const d = new Date(iso); if (isNaN(d)) return iso; return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };

/* 写真を縮小してJPEG dataURLに（容量を抑える） */
function fileToDataURL(file, maxDim = 1400, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxDim || h > maxDim) { const r = Math.min(maxDim / w, maxDim / h); w = Math.round(w * r); h = Math.round(h * r); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = fr.result;
    };
    fr.onerror = reject; fr.readAsDataURL(file);
  });
}

/* dataURL → Blob */
function dataURLtoBlob(dataURL) {
  const [head, b64] = dataURL.split(',');
  const mime = (head.match(/:(.*?);/) || [])[1] || 'application/octet-stream';
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

/* ===== クラウド：マスタ保存（app_state）===== */
const STATE_KEYS = ['staff', 'stores', 'categories'];
async function cloudLoad(userId) {
  STATE_KEYS.forEach(k => localStorage.removeItem('ssr_' + k));
  try {
    const { data } = await supa.from('app_state').select('data').eq('user_id', userId).maybeSingle();
    if (data && data.data) Object.entries(data.data).forEach(([k, v]) => { try { localStorage.setItem('ssr_' + k, JSON.stringify(v)); } catch {} });
  } catch (e) { console.warn('cloudLoad', e); }
}
async function cloudSave(userId) {
  const blob = {};
  STATE_KEYS.forEach(k => { const v = localStorage.getItem('ssr_' + k); if (v != null) blob[k] = JSON.parse(v); });
  try { await supa.from('app_state').upsert({ user_id: userId, data: blob, updated_at: new Date().toISOString() }); }
  catch (e) { console.warn('cloudSave', e); }
}

/* ===== PDF生成（HTMLレイアウト → html2canvas → jsPDF）===== */
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function photoBox(label, urls) {
  const cells = (urls && urls.length ? urls : []).map(u =>
    `<div style="flex:1 1 0;min-width:0;"><img src="${u}" style="width:100%;height:170px;object-fit:cover;border:1px solid #d1d5db;border-radius:6px;display:block;" crossorigin="anonymous"/></div>`
  ).join('') || `<div style="flex:1;color:#9ca3af;font-size:13px;padding:24px 0;text-align:center;border:1px dashed #d1d5db;border-radius:6px;">写真なし</div>`;
  return `<div style="flex:1;min-width:0;">
    <div style="font-size:12px;font-weight:700;color:#475569;margin:0 0 4px;">${label}</div>
    <div style="display:flex;gap:6px;">${cells}</div></div>`;
}
function reportHTML(r, masters) {
  const items = (r.items || []).map((it, i) => `
    <div style="margin-top:14px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;">
      <div style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:7px 12px;font-size:14px;font-weight:700;">
        <span style="display:inline-block;background:#0f172a;color:#fff;border-radius:5px;font-size:11px;padding:1px 7px;margin-right:8px;">作業${i + 1}</span>${esc(it.category || '（未選択）')}
      </div>
      <div style="padding:12px;">
        <div style="display:flex;gap:14px;">${photoBox('施工前', it.before)}${photoBox('施工後', it.after)}</div>
        ${it.note ? `<div style="margin-top:10px;font-size:13px;color:#334155;white-space:pre-wrap;"><b style="color:#475569;">メモ：</b>${esc(it.note)}</div>` : ''}
      </div>
    </div>`).join('');
  return `<div style="width:760px;background:#fff;padding:30px;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#0f172a;box-sizing:border-box;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #0f172a;padding-bottom:10px;margin-bottom:14px;">
      <div style="font-size:22px;font-weight:800;letter-spacing:1px;">店舗サポート　作業報告書</div>
      <div style="font-size:12px;color:#64748b;">店舗サポート事業部</div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:14px;">
      <tr><th style="${TH}">店舗</th><td style="${TD}">${esc(r.store)}</td><th style="${TH}">日時</th><td style="${TD}">${esc(fmtDate(r.date))}</td></tr>
      <tr><th style="${TH}">担当</th><td style="${TD}" colspan="3">${esc((r.staff || []).join('、'))}</td></tr>
    </table>
    ${items || '<div style="color:#9ca3af;padding:20px;text-align:center;">作業項目なし</div>'}
    ${r.note ? `<div style="margin-top:16px;border:1px solid #e2e8f0;border-radius:10px;padding:12px;">
      <div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:4px;">特記事項</div>
      <div style="font-size:13px;white-space:pre-wrap;line-height:1.6;">${esc(r.note)}</div></div>` : ''}
    <div style="margin-top:18px;text-align:right;font-size:11px;color:#94a3b8;">作成: ${esc(fmtDate(r.createdAt))}</div>
  </div>`;
}
const TH = 'border:1px solid #cbd5e1;background:#f1f5f9;padding:7px 10px;text-align:left;width:70px;white-space:nowrap;font-weight:700;';
const TD = 'border:1px solid #cbd5e1;padding:7px 10px;';

function waitImages(el) {
  const imgs = Array.from(el.querySelectorAll('img'));
  return Promise.all(imgs.map(im => im.complete ? Promise.resolve() : new Promise(res => { im.onload = im.onerror = res; })));
}
async function makePdfBlob(report, masters) {
  const stage = document.getElementById('pdf-stage');
  stage.innerHTML = reportHTML(report, masters);
  const node = stage.firstElementChild;
  await waitImages(node);
  const canvas = await html2canvas(node, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });
  stage.innerHTML = '';
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
  const imgW = pw, imgH = canvas.height * imgW / canvas.width;
  const img = canvas.toDataURL('image/jpeg', 0.9);
  let heightLeft = imgH, position = 0;
  pdf.addImage(img, 'JPEG', 0, position, imgW, imgH); heightLeft -= ph;
  while (heightLeft > 0) { position = heightLeft - imgH; pdf.addPage(); pdf.addImage(img, 'JPEG', 0, position, imgW, imgH); heightLeft -= ph; }
  return pdf.output('blob');
}

/* ===== クラウド：Storageアップロード＋LINE送信 ===== */
async function uploadBlob(path, blob, contentType) {
  const { error } = await supa.storage.from(STORAGE_BUCKET).upload(path, blob, { contentType, upsert: true });
  if (error) throw error;
  return supa.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
}
function lineText(r) {
  return ['【店舗サポート作業報告】',
    `店舗：${r.store || '-'}`,
    `日時：${fmtDate(r.date)}`,
    `担当：${(r.staff || []).join('、') || '-'}`,
    `作業：${(r.items || []).map(i => i.category).filter(Boolean).join('、') || '-'}`,
    r.note ? `特記：${r.note}` : ''
  ].filter(Boolean).join('\n');
}

/* =========================================================
   UI
========================================================= */
function Splash({ text }) { return <div className="min-h-screen flex items-center justify-center text-gray-400 text-sm">{text}</div>; }

function Login() {
  const [email, setEmail] = useState(''); const [pw, setPw] = useState('');
  const [busy, setBusy] = useState(false); const [msg, setMsg] = useState('');
  const submit = async e => { e.preventDefault(); setBusy(true); setMsg(''); const r = await supa.auth.signInWithPassword({ email, password: pw }); setBusy(false); if (r.error) setMsg(r.error.message); };
  const mailto = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent('店舗サポート報告アプリ アカウント発行依頼')}&body=${encodeURIComponent('お名前 / ログインに使うメールアドレス をご記入ください。')}`;
  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <form onSubmit={submit} className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 w-full max-w-sm space-y-4">
        <div className="text-center"><div className="text-3xl mb-1">🧰</div><h1 className="text-lg font-bold">店舗サポート 報告書</h1><p className="text-xs text-gray-400 mt-1">ログイン</p></div>
        <input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="メールアドレス" className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        <input type="password" required value={pw} onChange={e => setPw(e.target.value)} placeholder="パスワード" className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        {msg && <p className="text-xs text-red-500">{msg}</p>}
        <button disabled={busy} type="submit" className="w-full bg-gray-900 hover:bg-gray-700 disabled:opacity-50 text-white font-bold rounded-lg py-2.5">{busy ? '…' : 'ログイン'}</button>
        <div className="pt-3 border-t border-gray-100 text-center"><a href={mailto} className="text-xs text-blue-600 underline">アカウント発行を依頼する</a></div>
      </form>
    </div>
  );
}

/* ---------- 担当チップ（複数選択可）---------- */
function StaffPicker({ staff, value, onChange }) {
  const toggle = n => onChange(value.includes(n) ? value.filter(x => x !== n) : [...value, n]);
  if (!staff.length) return <p className="text-xs text-gray-400">「設定」で担当者を登録してください。</p>;
  return (
    <div className="flex flex-wrap gap-2">
      {staff.map(n => (
        <button key={n} type="button" onClick={() => toggle(n)}
          className={`px-3 py-1.5 rounded-full text-sm border ${value.includes(n) ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-700 border-gray-300'}`}>{n}</button>
      ))}
    </div>
  );
}

/* ---------- 写真追加ボタン＋サムネ ---------- */
function PhotoRow({ label, urls, onAdd, onRemove }) {
  const camRef = useRef(); const fileRef = useRef();
  const handle = async e => { const files = Array.from(e.target.files || []); for (const f of files) onAdd(await fileToDataURL(f)); e.target.value = ''; };
  return (
    <div className="flex-1 min-w-0">
      <div className="text-xs font-bold text-gray-500 mb-1">{label}</div>
      <div className="flex flex-wrap gap-2 items-start">
        {urls.map((u, i) => (
          <div key={i} className="relative">
            <img src={u} className="w-20 h-20 object-cover rounded-lg border border-gray-300" />
            <button type="button" onClick={() => onRemove(i)} className="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-gray-900 text-white text-xs leading-none">×</button>
          </div>
        ))}
        <div className="flex flex-col gap-1.5">
          <button type="button" onClick={() => camRef.current.click()} className="w-20 h-9 rounded-lg border border-gray-300 bg-white text-gray-600 text-xs flex items-center justify-center gap-1">📷 カメラ</button>
          <button type="button" onClick={() => fileRef.current.click()} className="w-20 h-9 rounded-lg border border-gray-300 bg-white text-gray-600 text-xs flex items-center justify-center gap-1">🖼 ファイル</button>
        </div>
        <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handle} />
        <input ref={fileRef} type="file" accept="image/*" multiple className="hidden" onChange={handle} />
      </div>
    </div>
  );
}

/* ---------- 作成画面（2ステップ：①基本情報 → ②作業項目）---------- */
function CreateTab({ masters, onDone }) {
  const [step, setStep] = useState('info'); // 'info' | 'items'
  const [store, setStore] = useState('');
  const [date, setDate] = useState(nowLocalInput());
  const [staff, setStaff] = useState([]);
  const [items, setItems] = useState([]);
  const [editingId, setEditingId] = useState(null); // 展開中の作業項目（1つだけ）
  const [note, setNote] = useState('');
  const [busy, setBusy] = useState('');

  const entered = it => it && (it.before.length || it.after.length || it.note); // 入力済み判定
  const itemFor = cat => items.find(it => it.category === cat);
  const updItem = (id, patch) => setItems(arr => arr.map(it => it.id === id ? { ...it, ...patch } : it));
  const delItem = id => { setItems(arr => arr.filter(it => it.id !== id)); setEditingId(e => e === id ? null : e); };
  // 項目名タップ → その項目の編集画面へ（無ければ作成）
  const openCat = cat => {
    let it = items.find(i => i.category === cat);
    if (!it) { it = { id: uid(), category: cat, before: [], after: [], note: '' }; setItems(a => [...a, it]); }
    setEditingId(it.id);
  };
  // 編集画面を閉じる（未入力なら破棄して一覧に残さない）
  const closeEditor = () => { setItems(arr => arr.filter(it => it.id !== editingId || entered(it))); setEditingId(null); };
  const addCustom = () => { const name = (prompt('項目名を入力') || '').trim(); if (!name) return; openCat(name); };

  const reset = () => { setStep('info'); setStore(''); setDate(nowLocalInput()); setStaff([]); setItems([]); setEditingId(null); setNote(''); };

  const buildReport = () => ({
    id: uid(), store, date, staff,
    items: items.filter(it => it.category && entered(it)).map(({ id, ...rest }) => rest),
    note, createdAt: new Date().toISOString()
  });

  const goItems = () => {
    if (!store) { alert('店舗を選択してください。'); return; }
    if (!staff.length) { alert('担当を選択してください。'); return; }
    setStep('items');
  };
  const validate = () => {
    if (!items.some(it => entered(it))) return '写真かメモを入力した項目が1つもありません。';
    return '';
  };

  const finish = async () => {
    const err = validate(); if (err) { alert(err); return; }
    const report = buildReport();
    try {
      setBusy('PDFを作成中…');
      const pdf = await makePdfBlob(report, masters);
      let pdfUrl = '', imageUrl = '', sent = false;

      if (AUTH_ENABLED && supa) {
        setBusy('アップロード中…');
        const base = `${report.id}`;
        pdfUrl = await uploadBlob(`${base}/report.pdf`, pdf, 'application/pdf');
        const cover = report.items.flatMap(i => i.after.concat(i.before))[0];
        if (cover) imageUrl = await uploadBlob(`${base}/cover.jpg`, dataURLtoBlob(cover), 'image/jpeg');
        setBusy('LINEへ送信中…');
        try {
          const { error } = await supa.functions.invoke('send-line', { body: { text: lineText(report), pdfUrl, imageUrl } });
          if (error) throw error; sent = true;
        } catch (e) { console.warn('send-line', e); }
        report.pdfUrl = pdfUrl;
      }

      // 端末側にも常に共有/保存できるようにする（LINE未設定でも完結）
      const file = new File([pdf], `報告書_${report.store}_${report.date.slice(0,10)}.pdf`, { type: 'application/pdf' });
      if (!sent && navigator.canShare && navigator.canShare({ files: [file] })) {
        setBusy(''); try { await navigator.share({ files: [file], title: '作業報告書', text: lineText(report) }); } catch {}
      } else if (!sent) {
        const a = document.createElement('a'); a.href = URL.createObjectURL(pdf); a.download = file.name; a.click();
      }

      onDone(report);
      setBusy('');
      alert(sent ? 'LINEへ送信し、保存しました。' : 'PDFを作成しました。（LINE未設定のため共有/保存で対応）');
      reset();
    } catch (e) { console.error(e); setBusy(''); alert('作成に失敗しました: ' + (e.message || e)); }
  };

  /* ===== ステップ① 基本情報 ===== */
  if (step === 'info') {
    return (
      <div className="max-w-xl mx-auto px-4 py-4 space-y-4 pb-safe">
        <StepBar step={1} />
        <Section title="店舗・日時・担当">
          <label className="block text-xs font-bold text-gray-500 mb-1">店舗</label>
          <select value={store} onChange={e => setStore(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3">
            <option value="">選択してください</option>
            {masters.stores.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <label className="block text-xs font-bold text-gray-500 mb-1">日時</label>
          <input type="datetime-local" value={date} onChange={e => setDate(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3" />
          <label className="block text-xs font-bold text-gray-500 mb-1">作業担当者（複数可）</label>
          <StaffPicker staff={masters.staff} value={staff} onChange={setStaff} />
        </Section>
        <button onClick={goItems} className="w-full bg-gray-900 hover:bg-gray-700 text-white font-bold rounded-xl py-3.5 shadow-sm">作業の入力へ →</button>
      </div>
    );
  }

  /* ===== ステップ② 項目の編集画面（項目名タップで入る）===== */
  const editing = items.find(it => it.id === editingId);
  if (editing) {
    return (
      <div className="max-w-xl mx-auto px-4 py-4 space-y-4 pb-safe">
        <button onClick={closeEditor} className="text-sm text-blue-600 font-bold">← 項目一覧へ戻る</button>
        <Section title={editing.category} right={<button onClick={() => delItem(editing.id)} className="text-xs text-red-500">この項目を削除</button>}>
          <div className="flex gap-4 mb-3">
            <PhotoRow label="施工前" urls={editing.before} onAdd={u => updItem(editing.id, { before: [...editing.before, u] })} onRemove={i => updItem(editing.id, { before: editing.before.filter((_, x) => x !== i) })} />
            <PhotoRow label="施工後" urls={editing.after} onAdd={u => updItem(editing.id, { after: [...editing.after, u] })} onRemove={i => updItem(editing.id, { after: editing.after.filter((_, x) => x !== i) })} />
          </div>
          <textarea value={editing.note} onChange={e => updItem(editing.id, { note: e.target.value })} placeholder="この作業のメモ（任意）" rows={3} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </Section>
        <button onClick={closeEditor} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl py-3.5 shadow-sm">保存して一覧へ</button>
      </div>
    );
  }

  /* ===== ステップ② 項目一覧（タップして写真入力へ）===== */
  const extra = items.filter(it => !masters.categories.includes(it.category)); // マスタ外（その他で追加した項目）
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-3 pb-safe">
      <StepBar step={2} />
      {/* 基本情報サマリ（タップで①へ戻って修正） */}
      <button onClick={() => setStep('info')} className="w-full text-left bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-3 flex items-center justify-between">
        <div className="min-w-0">
          <div className="font-bold truncate">{store}</div>
          <div className="text-xs text-gray-500 mt-0.5">{fmtDate(date)} ・ {staff.join('、')}</div>
        </div>
        <span className="text-xs text-blue-600 shrink-0 ml-3">修正</span>
      </button>

      <p className="text-xs text-gray-400 px-1 pt-1">項目をタップして写真を追加</p>
      {/* 定番の清掃項目（マスタ）をタップ → 編集画面へ */}
      {masters.categories.map(cat => {
        const it = itemFor(cat); const ok = entered(it);
        return (
          <button key={cat} onClick={() => openCat(cat)} className={`w-full text-left rounded-xl border shadow-sm px-4 py-3.5 flex items-center justify-between ${ok ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-gray-200'}`}>
            <div className="flex items-center gap-2.5 min-w-0">
              <span className={`w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${ok ? 'bg-emerald-500 text-white' : 'bg-gray-100 text-gray-400'}`}>{ok ? '✓' : '＋'}</span>
              <span className="font-bold truncate">{cat}</span>
            </div>
            <span className="text-xs text-gray-400 shrink-0 ml-3">{ok ? `前${it.before.length}・後${it.after.length}` : '未入力'}</span>
          </button>
        );
      })}

      {/* マスタ外（その他で追加した項目） */}
      {extra.map(it => (
        <button key={it.id} onClick={() => openCat(it.category)} className="w-full text-left rounded-xl border border-emerald-300 bg-emerald-50 shadow-sm px-4 py-3.5 flex items-center justify-between">
          <div className="flex items-center gap-2.5 min-w-0">
            <span className="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold shrink-0 bg-emerald-500 text-white">✓</span>
            <span className="font-bold truncate">{it.category}</span>
          </div>
          <span onClick={e => { e.stopPropagation(); delItem(it.id); }} className="text-xs text-red-500 shrink-0 ml-3">削除</span>
        </button>
      ))}

      <button onClick={addCustom} className="w-full border-2 border-dashed border-gray-300 text-gray-500 rounded-xl py-3 text-sm font-bold">＋ その他の項目を追加</button>

      <Section title="特記事項">
        <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="全体の特記事項（任意）" rows={3} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
      </Section>

      <button onClick={finish} disabled={!!busy} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:opacity-60 text-white font-bold rounded-xl py-3.5 shadow-sm">
        {busy || '✅ 完了して送信'}
      </button>
    </div>
  );
}

/* ステップ表示 */
function StepBar({ step }) {
  const Item = ({ n, label }) => (
    <div className="flex items-center gap-1.5">
      <span className={`w-6 h-6 rounded-full text-xs font-bold flex items-center justify-center ${step === n ? 'bg-gray-900 text-white' : step > n ? 'bg-emerald-500 text-white' : 'bg-gray-200 text-gray-500'}`}>{step > n ? '✓' : n}</span>
      <span className={`text-xs font-bold ${step === n ? 'text-gray-900' : 'text-gray-400'}`}>{label}</span>
    </div>
  );
  return (
    <div className="flex items-center justify-center gap-3 py-1">
      <Item n={1} label="基本情報" />
      <span className="w-6 h-px bg-gray-300" />
      <Item n={2} label="作業項目" />
    </div>
  );
}

/* ---------- 履歴画面 ---------- */
function HistoryTab({ reports, masters, onDelete }) {
  const [view, setView] = useState(null);
  const reshare = async r => {
    const pdf = await makePdfBlob(r, masters);
    const file = new File([pdf], `報告書_${r.store}_${(r.date||'').slice(0,10)}.pdf`, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) { try { await navigator.share({ files: [file], title: '作業報告書', text: lineText(r) }); } catch {} }
    else { const a = document.createElement('a'); a.href = URL.createObjectURL(pdf); a.download = file.name; a.click(); }
  };
  if (!reports.length) return <div className="max-w-xl mx-auto px-4 py-16 text-center text-gray-400 text-sm">まだ報告書がありません。</div>;
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-3 pb-safe">
      {reports.map(r => (
        <div key={r.id} className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
          <div className="flex justify-between items-start">
            <div>
              <div className="font-bold">{r.store || '（店舗未設定）'}</div>
              <div className="text-xs text-gray-500 mt-0.5">{fmtDate(r.date)} ・ {(r.staff || []).join('、')}</div>
              <div className="text-xs text-gray-400 mt-1">{(r.items || []).map(i => i.category).filter(Boolean).join('、')}</div>
            </div>
            <div className="text-right space-y-1 shrink-0 ml-3">
              <button onClick={() => reshare(r)} className="block text-xs text-blue-600 underline">PDF共有</button>
              {r.pdfUrl && <a href={r.pdfUrl} target="_blank" rel="noopener" className="block text-xs text-blue-600 underline">クラウド</a>}
              <button onClick={() => { if (confirm('この報告書を削除しますか？')) onDelete(r.id); }} className="block text-xs text-red-500">削除</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- マスタ編集 ---------- */
function ListEditor({ title, items, onChange, placeholder }) {
  const [v, setV] = useState('');
  const add = () => { const t = v.trim(); if (!t || items.includes(t)) { setV(''); return; } onChange([...items, t]); setV(''); };
  return (
    <Section title={title}>
      <div className="flex gap-2 mb-3">
        <input value={v} onChange={e => setV(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()} placeholder={placeholder} className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        <button onClick={add} className="bg-gray-900 text-white rounded-lg px-4 text-sm font-bold">追加</button>
      </div>
      <div className="flex flex-wrap gap-2">
        {items.length === 0 && <span className="text-xs text-gray-400">未登録</span>}
        {items.map(n => (
          <span key={n} className="inline-flex items-center gap-1 bg-gray-100 rounded-full pl-3 pr-1.5 py-1 text-sm">
            {n}<button onClick={() => onChange(items.filter(x => x !== n))} className="w-5 h-5 rounded-full bg-gray-300 text-white text-xs leading-none">×</button>
          </span>
        ))}
      </div>
    </Section>
  );
}
function SettingsTab({ masters, setMasters, session }) {
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-4 pb-safe">
      <ListEditor title="担当者" items={masters.staff} placeholder="担当者名" onChange={v => setMasters(m => ({ ...m, staff: v }))} />
      <ListEditor title="店舗" items={masters.stores} placeholder="店舗名" onChange={v => setMasters(m => ({ ...m, stores: v }))} />
      <ListEditor title="項目カテゴリ" items={masters.categories} placeholder="カテゴリ名" onChange={v => setMasters(m => ({ ...m, categories: v }))} />
      {AUTH_ENABLED
        ? <p className="text-xs text-gray-400 px-1">ログイン中：{session?.user?.email}（マスタはクラウド同期）</p>
        : <p className="text-xs text-gray-400 px-1">ローカル保存モード（Supabase未設定）。クラウド同期・LINE自動送信を使うには index.html 上部の SUPABASE 設定を入力してください。</p>}
    </div>
  );
}

function Section({ title, right, children }) {
  return (
    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div className="flex items-center justify-between mb-3"><h2 className="text-sm font-bold text-gray-700">{title}</h2>{right}</div>
      {children}
    </div>
  );
}

/* ---------- アプリ本体 ---------- */
function App({ session }) {
  const [tab, setTab] = useState('create');
  const [masters, setMasters] = useState(() => ({
    staff: load('staff', []),
    stores: load('stores', []),
    categories: load('categories', DEFAULT_CATEGORIES),
  }));
  const [reports, setReports] = useState(() => load('reports', []));

  useEffect(() => { save('staff', masters.staff); save('stores', masters.stores); save('categories', masters.categories); }, [masters]);
  useEffect(() => save('reports', reports), [reports]);

  // マスタのクラウド保存（ログイン時・1.5秒デバウンス）
  useEffect(() => {
    if (!AUTH_ENABLED || !session) return;
    const t = setTimeout(() => cloudSave(session.user.id), 1500);
    return () => clearTimeout(t);
  }, [masters]);

  const addReport = r => setReports(arr => [r, ...arr]);
  const delReport = id => setReports(arr => arr.filter(r => r.id !== id));

  const tabs = [['create', '作成', '📝'], ['history', '履歴', '🗂'], ['settings', '設定', '⚙️']];
  return (
    <div className="min-h-screen">
      <header className="bg-white border-b border-gray-200 sticky top-0 z-20">
        <div className="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="font-bold flex items-center gap-2"><span>🧰</span>店舗サポート 報告書</div>
          {AUTH_ENABLED && session && <button onClick={() => supa.auth.signOut()} className="text-xs text-gray-500 border border-gray-300 rounded-lg px-3 py-1">ログアウト</button>}
        </div>
      </header>

      {tab === 'create' && <CreateTab masters={masters} onDone={addReport} />}
      {tab === 'history' && <HistoryTab reports={reports} masters={masters} onDelete={delReport} />}
      {tab === 'settings' && <SettingsTab masters={masters} setMasters={setMasters} session={session} />}

      <nav className="fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 z-20 nav-safe">
        <div className="max-w-xl mx-auto grid grid-cols-3">
          {tabs.map(([k, label, icon]) => (
            <button key={k} onClick={() => setTab(k)} className={`py-2.5 flex flex-col items-center gap-0.5 text-xs ${tab === k ? 'text-emerald-600 font-bold' : 'text-gray-400'}`}>
              <span className="text-lg leading-none">{icon}</span>{label}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

function Root() {
  const [session, setSession] = useState(AUTH_ENABLED ? undefined : null);
  const [ready, setReady] = useState(!AUTH_ENABLED);
  useEffect(() => {
    if (!AUTH_ENABLED) return;
    supa.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = supa.auth.onAuthStateChange((_e, s) => { setSession(s); setReady(false); });
    return () => sub.subscription.unsubscribe();
  }, []);
  useEffect(() => { if (!AUTH_ENABLED || !session) return; cloudLoad(session.user.id).finally(() => setReady(true)); }, [session]);
  if (!AUTH_ENABLED) return <App session={null} />;
  if (session === undefined) return <Splash text="読み込み中…" />;
  if (!session) return <Login />;
  if (!ready) return <Splash text="データを読み込み中…" />;
  return <App key={session.user.id} session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
