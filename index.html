<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>店舗サポート 報告書</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#f1f5f9; -webkit-tap-highlight-color: transparent; }
  input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  /* スマホで下部ナビ分の余白 */
  .pb-safe { padding-bottom: calc(76px + env(safe-area-inset-bottom)); }
  /* 下部ナビ＋固定の完了バー分の余白（作業項目画面で使用） */
  .pb-action { padding-bottom: calc(150px + env(safe-area-inset-bottom)); }
  .nav-safe { padding-bottom: env(safe-area-inset-bottom); }
  /* PDF描画用のオフスクリーン領域 */
  #pdf-stage { position:fixed; left:-10000px; top:0; }
</style>
</head>
<body class="text-gray-900">
<div id="root"></div>
<div id="pdf-stage"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ===== LINE自動送信（Google Apps Script 経由・任意）=====
   GAS の Webアプリ URL を貼ると、完了時に PDF/写真を Google Drive に保存して
   LINE へ自動送信します（テキスト要約＋PDFリンク＋表紙画像 best-effort）。
   LINEトークン等の秘密は GAS 側(Script Properties)にのみ保持。ここに置くのは公開URLだけ。
   空のままだと送信せず、端末の共有/保存にフォールバックします（オフラインでも完結）。 */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxZAke1CY-GPrtxByX0u1SdXBDVuYhJqKa-auhdNXcdxtvXMsV6_n1WbaIs7wXgpXSO/exec'; // GAS WebアプリURL
const LINE_ENABLED = /^https?:\/\//.test(GAS_URL);

/* ---------- 永続化（localStorage・キー接頭辞 ssr_）---------- */
const load = (k, d) => { try { const v = localStorage.getItem('ssr_'+k); return v ? JSON.parse(v) : d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem('ssr_'+k, JSON.stringify(v)); } catch {} };

/* ---------- マスタ初期値 ---------- */
const DEFAULT_STAFF = ['ゆうた', 'こたろう', 'ゆうしん'];
const DEFAULT_STORES = ['神楽坂', '高円寺', '水道橋', '茅場町', '大塚'];
const DEFAULT_CATEGORIES = ['グリストラップ清掃','フィルター清掃','エアコン清掃','厨房清掃','排水溝清掃','その他'];

/* ---------- 小物 ---------- */
const uid = () => (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).slice(2);
const pad = n => String(n).padStart(2, '0');
const nowLocalInput = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const fmtDate = iso => { if (!iso) return ''; const d = new Date(iso); if (isNaN(d)) return iso; return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };

/* 写真を縮小してJPEG dataURLに（容量を抑える） */
function fileToDataURL(file, maxDim = 1400, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxDim || h > maxDim) { const r = Math.min(maxDim / w, maxDim / h); w = Math.round(w * r); h = Math.round(h * r); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = fr.result;
    };
    fr.onerror = reject; fr.readAsDataURL(file);
  });
}

/* dataURL → Blob */
function dataURLtoBlob(dataURL) {
  const [head, b64] = dataURL.split(',');
  const mime = (head.match(/:(.*?);/) || [])[1] || 'application/octet-stream';
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

/* マスタ・報告書は端末内(localStorage)にのみ保存（クラウド保存なし）。 */

/* ===== PDF生成（HTMLレイアウト → html2canvas → jsPDF）===== */
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function photoBox(label, urls) {
  // 写真は object-fit:contain で全体を見せる（縦撮りでも切り取らない）。
  // 1枚=大、2枚以上=横並びでwrap。背景は灰色で余白を埋める。
  const cells = (urls && urls.length ? urls : []).map(u =>
    `<div style="flex:1 1 45%;min-width:0;background:#f1f5f9;border:1px solid #d1d5db;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;">
       <img src="${u}" style="display:block;max-width:100%;max-height:300px;width:auto;height:auto;object-fit:contain;" crossorigin="anonymous"/>
     </div>`
  ).join('') || `<div style="flex:1;color:#9ca3af;font-size:13px;padding:32px 0;text-align:center;border:1px dashed #d1d5db;border-radius:6px;">写真なし</div>`;
  return `<div style="flex:1;min-width:0;">
    <div style="font-size:12px;font-weight:700;color:#475569;margin:0 0 4px;">${label}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:stretch;">${cells}</div></div>`;
}
function reportHTML(r, masters) {
  const items = (r.items || []).map((it, i) => `
    <div style="margin-top:14px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;">
      <div style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:7px 12px;font-size:14px;font-weight:700;">
        <span style="display:inline-block;background:#0f172a;color:#fff;border-radius:5px;font-size:11px;padding:1px 7px;margin-right:8px;">作業${i + 1}</span>${esc(it.category || '（未選択）')}
      </div>
      <div style="padding:12px;">
        <div style="display:flex;gap:14px;">${photoBox('施工前', it.before)}${photoBox('施工後', it.after)}</div>
        ${it.note ? `<div style="margin-top:10px;font-size:13px;color:#334155;white-space:pre-wrap;"><b style="color:#475569;">メモ：</b>${esc(it.note)}</div>` : ''}
      </div>
    </div>`).join('');
  return `<div style="width:760px;background:#fff;padding:30px;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#0f172a;box-sizing:border-box;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #0f172a;padding-bottom:10px;margin-bottom:14px;">
      <div style="font-size:22px;font-weight:800;letter-spacing:1px;">店舗サポート　作業報告書</div>
      <div style="font-size:12px;color:#64748b;">店舗サポート事業部</div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:14px;">
      <tr><th style="${TH}">店舗</th><td style="${TD}">${esc(r.store)}</td><th style="${TH}">日時</th><td style="${TD}">${esc(fmtDate(r.date))}</td></tr>
      <tr><th style="${TH}">担当</th><td style="${TD}" colspan="3">${esc((r.staff || []).join('、'))}</td></tr>
    </table>
    ${items || '<div style="color:#9ca3af;padding:20px;text-align:center;">作業項目なし</div>'}
    ${r.note ? `<div style="margin-top:16px;border:1px solid #e2e8f0;border-radius:10px;padding:12px;">
      <div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:4px;">特記事項</div>
      <div style="font-size:13px;white-space:pre-wrap;line-height:1.6;">${esc(r.note)}</div></div>` : ''}
    <div style="margin-top:18px;text-align:right;font-size:11px;color:#94a3b8;">作成: ${esc(fmtDate(r.createdAt))}</div>
  </div>`;
}
const TH = 'border:1px solid #cbd5e1;background:#f1f5f9;padding:7px 10px;text-align:left;width:70px;white-space:nowrap;font-weight:700;';
const TD = 'border:1px solid #cbd5e1;padding:7px 10px;';

function waitImages(el) {
  const imgs = Array.from(el.querySelectorAll('img'));
  return Promise.all(imgs.map(im => im.complete ? Promise.resolve() : new Promise(res => { im.onload = im.onerror = res; })));
}
async function makePdfBlob(report, masters) {
  const stage = document.getElementById('pdf-stage');
  stage.innerHTML = reportHTML(report, masters);
  const node = stage.firstElementChild;
  await waitImages(node);
  const canvas = await html2canvas(node, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });
  stage.innerHTML = '';
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
  const imgW = pw, imgH = canvas.height * imgW / canvas.width;
  const img = canvas.toDataURL('image/jpeg', 0.9);
  let heightLeft = imgH, position = 0;
  pdf.addImage(img, 'JPEG', 0, position, imgW, imgH); heightLeft -= ph;
  while (heightLeft > 0) { position = heightLeft - imgH; pdf.addPage(); pdf.addImage(img, 'JPEG', 0, position, imgW, imgH); heightLeft -= ph; }
  return pdf.output('blob');
}

/* ===== LINE送信（Google Apps Script 経由）===== */
/* Blob → base64（dataURLのプレフィックスを除いた純粋なbase64）*/
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result).split(',')[1] || '');
    fr.onerror = reject; fr.readAsDataURL(blob);
  });
}
/* 完了報告を GAS 経由で LINE へ送信。成功で {ok, pdfUrl} を返す。*/
async function sendToLine(report, pdfBlob) {
  const pdfBase64 = await blobToBase64(pdfBlob);
  const cover = report.items.flatMap(i => i.after.concat(i.before))[0] || '';
  const payload = {
    text: lineText(report),
    filename: `報告書_${report.store}_${(report.date || '').slice(0, 10)}.pdf`,
    pdfBase64,
    coverBase64: cover ? cover.split(',')[1] : '',
  };
  // Content-Type を text/plain にして GAS の CORS プリフライト(OPTIONS)を回避する
  const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
  let out = {};
  try { out = await res.json(); } catch {}
  if (!res.ok || out.error) throw new Error(out.error || ('HTTP ' + res.status));
  return out;
}
function lineText(r) {
  return ['【店舗サポート作業報告】',
    `店舗：${r.store || '-'}`,
    `日時：${fmtDate(r.date)}`,
    `担当：${(r.staff || []).join('、') || '-'}`,
    `作業：${(r.items || []).map(i => i.category).filter(Boolean).join('、') || '-'}`,
    r.note ? `特記：${r.note}` : ''
  ].filter(Boolean).join('\n');
}

/* =========================================================
   UI
========================================================= */
function Splash({ text }) { return <div className="min-h-screen flex items-center justify-center text-gray-400 text-sm">{text}</div>; }

/* ---------- 担当チップ（複数選択可）---------- */
function StaffPicker({ staff, value, onChange }) {
  const toggle = n => onChange(value.includes(n) ? value.filter(x => x !== n) : [...value, n]);
  if (!staff.length) return <p className="text-xs text-gray-400">「設定」で担当者を登録してください。</p>;
  return (
    <div className="flex flex-wrap gap-2">
      {staff.map(n => (
        <button key={n} type="button" onClick={() => toggle(n)}
          className={`px-3 py-1.5 rounded-full text-sm border ${value.includes(n) ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-700 border-gray-300'}`}>{n}</button>
      ))}
    </div>
  );
}

/* ---------- 写真追加ボタン＋サムネ ---------- */
function PhotoRow({ label, urls, onAdd, onRemove }) {
  const camRef = useRef(); const fileRef = useRef();
  const handle = async e => { const files = Array.from(e.target.files || []); for (const f of files) onAdd(await fileToDataURL(f)); e.target.value = ''; };
  return (
    <div className="flex-1 min-w-0">
      <div className="text-xs font-bold text-gray-500 mb-1">{label}</div>
      <div className="flex flex-wrap gap-2 items-start">
        {urls.map((u, i) => (
          <div key={i} className="relative">
            <img src={u} className="w-20 h-20 object-cover rounded-lg border border-gray-300" />
            <button type="button" onClick={() => onRemove(i)} className="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-gray-900 text-white text-xs leading-none">×</button>
          </div>
        ))}
        <div className="flex flex-col gap-1.5">
          <button type="button" onClick={() => camRef.current.click()} className="w-20 h-9 rounded-lg border border-gray-300 bg-white text-gray-600 text-xs flex items-center justify-center gap-1">📷 カメラ</button>
          <button type="button" onClick={() => fileRef.current.click()} className="w-20 h-9 rounded-lg border border-gray-300 bg-white text-gray-600 text-xs flex items-center justify-center gap-1">🖼 ファイル</button>
        </div>
        <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handle} />
        <input ref={fileRef} type="file" accept="image/*" multiple className="hidden" onChange={handle} />
      </div>
    </div>
  );
}

/* ---------- 作成画面（2ステップ：①基本情報 → ②作業項目）---------- */
function CreateTab({ masters, onDone }) {
  // 下書き（タブ切替・ブラウザ閉じでも残るよう localStorage に自動保存）
  const draft = load('draft', null) || {};
  const [step, setStep] = useState(draft.step || 'info');
  const [store, setStore] = useState(draft.store || '');
  const [date, setDate] = useState(draft.date || nowLocalInput());
  const [staff, setStaff] = useState(draft.staff || []);
  const [items, setItems] = useState(draft.items || []);
  const [editingId, setEditingId] = useState(draft.editingId || null);
  const [note, setNote] = useState(draft.note || '');
  const [busy, setBusy] = useState('');

  // 入力が変わるたび下書きを保存。容量超過時は写真を除いてテキストだけでも残す。
  useEffect(() => {
    const draft = { step, store, date, staff, items, editingId, note };
    try { localStorage.setItem('ssr_draft', JSON.stringify(draft)); }
    catch {
      try {
        const lite = { ...draft, items: items.map(it => ({ ...it, before: [], after: [] })) };
        localStorage.setItem('ssr_draft', JSON.stringify(lite));
      } catch {}
    }
  }, [step, store, date, staff, items, editingId, note]);

  const entered = it => it && (it.before.length || it.after.length); // 写真がある＝使用中
  const complete = it => it && it.before.length && it.after.length; // 施工前・後がそろっている
  const itemFor = cat => items.find(it => it.category === cat);
  const updItem = (id, patch) => setItems(arr => arr.map(it => it.id === id ? { ...it, ...patch } : it));
  const delItem = id => { setItems(arr => arr.filter(it => it.id !== id)); setEditingId(e => e === id ? null : e); };
  // 項目名タップ → その項目の編集画面へ（無ければ作成）
  const openCat = cat => {
    let it = items.find(i => i.category === cat);
    if (!it) { it = { id: uid(), category: cat, before: [], after: [], note: '' }; setItems(a => [...a, it]); }
    setEditingId(it.id);
  };
  // 編集画面を閉じる（未入力なら破棄して一覧に残さない）
  const closeEditor = () => { setItems(arr => arr.filter(it => it.id !== editingId || entered(it))); setEditingId(null); };
  const addCustom = () => { const name = (prompt('項目名を入力') || '').trim(); if (!name) return; openCat(name); };

  const reset = () => {
    try { localStorage.removeItem('ssr_draft'); } catch {}
    setStep('info'); setStore(''); setDate(nowLocalInput()); setStaff([]); setItems([]); setEditingId(null); setNote('');
  };

  const buildReport = () => ({
    id: uid(), store, date, staff,
    items: items.filter(it => it.category && entered(it)).map(({ id, ...rest }) => rest),
    note, createdAt: new Date().toISOString()
  });

  const goItems = () => {
    if (!store) { alert('店舗を選択してください。'); return; }
    if (!staff.length) { alert('担当を選択してください。'); return; }
    setStep('items');
  };
  const validate = () => {
    const used = items.filter(entered);
    if (!used.length) return '写真を入れた項目が1つもありません。';
    const ng = used.filter(it => !complete(it)).map(it => it.category);
    if (ng.length) return `次の項目は施工前・施工後の両方の写真が必要です：\n${ng.join('、')}`;
    return '';
  };

  const finish = async () => {
    const err = validate(); if (err) { alert(err); return; }
    const report = buildReport();
    try {
      setBusy('PDFを作成中…');
      const pdf = await makePdfBlob(report, masters);
      const file = new File([pdf], `報告書_${report.store}_${(report.date || '').slice(0,10)}.pdf`, { type: 'application/pdf' });
      let sent = false;
      let sendErr = '';

      if (LINE_ENABLED) {
        try {
          setBusy('LINEへ送信中…');
          const out = await sendToLine(report, pdf);
          if (out && out.pdfUrl) report.pdfUrl = out.pdfUrl;
          sent = true;
        } catch (e) {
          console.warn('sendToLine', e);
          sendErr = (e && e.message) ? e.message : String(e);
        }
      }

      // LINE未設定 or 送信失敗 → 端末の共有/保存にフォールバック（オフラインでも完結）
      if (!sent) {
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          setBusy(''); try { await navigator.share({ files: [file], title: '作業報告書', text: lineText(report) }); } catch {}
        } else {
          const a = document.createElement('a'); a.href = URL.createObjectURL(pdf); a.download = file.name; a.click();
        }
      }

      onDone(report);
      setBusy('');
      alert(sent ? 'LINEへ送信し、保存しました。'
        : (LINE_ENABLED ? `LINE送信に失敗（端末の共有/保存で対応しました）。\n\n原因: ${sendErr || '不明'}`
                        : 'PDFを作成しました。（LINE未設定のため共有/保存で対応）'));
      reset();
    } catch (e) { console.error(e); setBusy(''); alert('作成に失敗しました: ' + (e.message || e)); }
  };

  /* ===== ステップ① 基本情報 ===== */
  if (step === 'info') {
    return (
      <div className="max-w-xl mx-auto px-4 py-4 space-y-4 pb-safe">
        <StepBar step={1} />
        <Section title="店舗・日時・担当">
          <label className="block text-xs font-bold text-gray-500 mb-1">店舗</label>
          <select value={store} onChange={e => setStore(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3">
            <option value="">選択してください</option>
            {masters.stores.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <label className="block text-xs font-bold text-gray-500 mb-1">日時</label>
          <input type="datetime-local" value={date} onChange={e => setDate(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3" />
          <label className="block text-xs font-bold text-gray-500 mb-1">作業担当者（複数可）</label>
          <StaffPicker staff={masters.staff} value={staff} onChange={setStaff} />
        </Section>
        <button onClick={goItems} className="w-full bg-gray-900 hover:bg-gray-700 text-white font-bold rounded-xl py-3.5 shadow-sm">作業の入力へ →</button>
      </div>
    );
  }

  /* 項目の表示順：店舗の定番 → その他 → 追加(その他)項目 */
  const extra = items.filter(it => !masters.categories.includes(it.category)); // マスタ外（その他で追加）
  const storeDef = (masters.storeDefaults && masters.storeDefaults[store]) || [];
  const defaultCats = masters.categories.filter(c => storeDef.includes(c));
  const otherCats = masters.categories.filter(c => !storeDef.includes(c));
  const orderedCats = [...defaultCats, ...otherCats, ...extra.map(it => it.category)];

  /* ===== ステップ② 項目の編集画面（項目名タップで入る）===== */
  const editing = items.find(it => it.id === editingId);
  if (editing) {
    const idx = orderedCats.indexOf(editing.category);
    const hasNext = idx >= 0 && idx < orderedCats.length - 1;
    const gotoNext = () => {
      const cur = editing;
      setItems(arr => arr.filter(it => it.id !== cur.id || entered(it))); // 未入力なら破棄
      const next = orderedCats[idx + 1];
      if (next) openCat(next); else setEditingId(null);
    };
    const photoMissing = !complete(editing) && entered(editing);
    return (
      <div className="max-w-xl mx-auto px-4 py-4 space-y-4 pb-safe">
        <button onClick={closeEditor} className="text-sm text-blue-600 font-bold">← 項目一覧へ戻る</button>
        <Section title={editing.category} right={<button onClick={() => delItem(editing.id)} className="text-xs text-red-500">この項目を削除</button>}>
          <div className="flex gap-4 mb-3">
            <PhotoRow label="施工前 *" urls={editing.before} onAdd={u => updItem(editing.id, { before: [...editing.before, u] })} onRemove={i => updItem(editing.id, { before: editing.before.filter((_, x) => x !== i) })} />
            <PhotoRow label="施工後 *" urls={editing.after} onAdd={u => updItem(editing.id, { after: [...editing.after, u] })} onRemove={i => updItem(editing.id, { after: editing.after.filter((_, x) => x !== i) })} />
          </div>
          {photoMissing && <p className="text-xs text-amber-600 mb-3">※ 施工前・施工後の両方の写真が必要です（* 必須）。</p>}
          <textarea value={editing.note} onChange={e => updItem(editing.id, { note: e.target.value })} placeholder="この作業のメモ（任意）" rows={3} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </Section>
        <div className="flex gap-2">
          <button onClick={closeEditor} className="flex-1 bg-white border border-gray-300 text-gray-700 font-bold rounded-xl py-3.5">一覧へ</button>
          <button onClick={gotoNext} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl py-3.5 shadow-sm">{hasNext ? '次の項目へ →' : '保存して一覧へ'}</button>
        </div>
      </div>
    );
  }

  /* 項目1行の表示（タップで編集画面へ）。状態＝完了(緑✓)/写真不足(橙!)/未入力(灰＋） */
  const catRow = cat => {
    const it = itemFor(cat), ok = complete(it), partial = entered(it) && !ok;
    return (
      <button key={cat} onClick={() => openCat(cat)} className={`w-full text-left rounded-xl border shadow-sm px-4 py-3.5 flex items-center justify-between ${ok ? 'bg-emerald-50 border-emerald-300' : partial ? 'bg-amber-50 border-amber-300' : 'bg-white border-gray-200'}`}>
        <div className="flex items-center gap-2.5 min-w-0">
          <span className={`w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${ok ? 'bg-emerald-500 text-white' : partial ? 'bg-amber-500 text-white' : 'bg-gray-100 text-gray-400'}`}>{ok ? '✓' : partial ? '!' : '＋'}</span>
          <span className="font-bold truncate">{cat}</span>
        </div>
        <span className={`text-xs shrink-0 ml-3 ${partial ? 'text-amber-600' : 'text-gray-400'}`}>{ok ? `前${it.before.length}・後${it.after.length}` : partial ? '写真不足' : '未入力'}</span>
      </button>
    );
  };

  /* ===== ステップ② 項目一覧（タップして写真入力へ）===== */
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-3 pb-action">
      <StepBar step={2} />
      {/* 基本情報サマリ（タップで①へ戻って修正） */}
      <button onClick={() => setStep('info')} className="w-full text-left bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-3 flex items-center justify-between">
        <div className="min-w-0">
          <div className="font-bold truncate">{store}</div>
          <div className="text-xs text-gray-500 mt-0.5">{fmtDate(date)} ・ {staff.join('、')}</div>
        </div>
        <span className="text-xs text-blue-600 shrink-0 ml-3">修正</span>
      </button>

      <p className="text-xs text-gray-400 px-1 pt-1">項目をタップして施工前・施工後の写真を追加</p>

      {/* 店舗の定番項目（設定で店舗ごとに指定）→ 上部にまとめて表示 */}
      {defaultCats.length > 0 && (
        <>
          <p className="text-[11px] font-bold text-emerald-700 px-1">★ この店舗の定番</p>
          {defaultCats.map(catRow)}
          {otherCats.length > 0 && <p className="text-[11px] font-bold text-gray-400 px-1 pt-1">その他の項目</p>}
        </>
      )}
      {otherCats.map(catRow)}

      {/* マスタ外（その他で追加した項目） */}
      {extra.map(it => { const ok = complete(it), partial = entered(it) && !ok; return (
        <button key={it.id} onClick={() => openCat(it.category)} className={`w-full text-left rounded-xl border shadow-sm px-4 py-3.5 flex items-center justify-between ${ok ? 'bg-emerald-50 border-emerald-300' : partial ? 'bg-amber-50 border-amber-300' : 'bg-white border-gray-200'}`}>
          <div className="flex items-center gap-2.5 min-w-0">
            <span className={`w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${ok ? 'bg-emerald-500 text-white' : partial ? 'bg-amber-500 text-white' : 'bg-gray-100 text-gray-400'}`}>{ok ? '✓' : partial ? '!' : '＋'}</span>
            <span className="font-bold truncate">{it.category}</span>
          </div>
          <span onClick={e => { e.stopPropagation(); delItem(it.id); }} className="text-xs text-red-500 shrink-0 ml-3">削除</span>
        </button>
      ); })}

      <button onClick={addCustom} className="w-full border-2 border-dashed border-gray-300 text-gray-500 rounded-xl py-3 text-sm font-bold">＋ その他の項目を追加</button>

      <Section title="特記事項">
        <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="全体の特記事項（任意）" rows={3} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
      </Section>

      {/* 完了して送信：画面下に固定（下部タブの上）→ スクロール不要でいつでも押せる */}
      <div className="fixed left-0 right-0 z-10 px-4 pb-2 bg-gradient-to-t from-slate-100 via-slate-100/95 to-transparent pt-3" style={{ bottom: 'calc(64px + env(safe-area-inset-bottom))' }}>
        <div className="max-w-xl mx-auto">
          <button onClick={finish} disabled={!!busy} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:opacity-60 text-white font-bold rounded-xl py-4 shadow-lg text-base">
            {busy || '✅ 完了して送信'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ステップ表示 */
function StepBar({ step }) {
  const Item = ({ n, label }) => (
    <div className="flex items-center gap-1.5">
      <span className={`w-6 h-6 rounded-full text-xs font-bold flex items-center justify-center ${step === n ? 'bg-gray-900 text-white' : step > n ? 'bg-emerald-500 text-white' : 'bg-gray-200 text-gray-500'}`}>{step > n ? '✓' : n}</span>
      <span className={`text-xs font-bold ${step === n ? 'text-gray-900' : 'text-gray-400'}`}>{label}</span>
    </div>
  );
  return (
    <div className="flex items-center justify-center gap-3 py-1">
      <Item n={1} label="基本情報" />
      <span className="w-6 h-px bg-gray-300" />
      <Item n={2} label="作業項目" />
    </div>
  );
}

/* ---------- 履歴画面 ---------- */
function HistoryTab({ reports, masters, onDelete }) {
  const [view, setView] = useState(null);
  const reshare = async r => {
    const pdf = await makePdfBlob(r, masters);
    const file = new File([pdf], `報告書_${r.store}_${(r.date||'').slice(0,10)}.pdf`, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) { try { await navigator.share({ files: [file], title: '作業報告書', text: lineText(r) }); } catch {} }
    else { const a = document.createElement('a'); a.href = URL.createObjectURL(pdf); a.download = file.name; a.click(); }
  };
  if (!reports.length) return <div className="max-w-xl mx-auto px-4 py-16 text-center text-gray-400 text-sm">まだ報告書がありません。</div>;
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-3 pb-safe">
      {reports.map(r => (
        <div key={r.id} className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
          <div className="flex justify-between items-start">
            <div>
              <div className="font-bold">{r.store || '（店舗未設定）'}</div>
              <div className="text-xs text-gray-500 mt-0.5">{fmtDate(r.date)} ・ {(r.staff || []).join('、')}</div>
              <div className="text-xs text-gray-400 mt-1">{(r.items || []).map(i => i.category).filter(Boolean).join('、')}</div>
            </div>
            <div className="text-right space-y-1 shrink-0 ml-3">
              <button onClick={() => reshare(r)} className="block text-xs text-blue-600 underline">PDF共有</button>
              {r.pdfUrl && <a href={r.pdfUrl} target="_blank" rel="noopener" className="block text-xs text-blue-600 underline">クラウド</a>}
              <button onClick={() => { if (confirm('この報告書を削除しますか？')) onDelete(r.id); }} className="block text-xs text-red-500">削除</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- マスタ編集 ---------- */
function ListEditor({ title, items, onChange, placeholder }) {
  const [v, setV] = useState('');
  const add = () => { const t = v.trim(); if (!t || items.includes(t)) { setV(''); return; } onChange([...items, t]); setV(''); };
  return (
    <Section title={title}>
      <div className="flex gap-2 mb-3">
        <input value={v} onChange={e => setV(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()} placeholder={placeholder} className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        <button onClick={add} className="bg-gray-900 text-white rounded-lg px-4 text-sm font-bold">追加</button>
      </div>
      <div className="flex flex-wrap gap-2">
        {items.length === 0 && <span className="text-xs text-gray-400">未登録</span>}
        {items.map(n => (
          <span key={n} className="inline-flex items-center gap-1 bg-gray-100 rounded-full pl-3 pr-1.5 py-1 text-sm">
            {n}<button onClick={() => onChange(items.filter(x => x !== n))} className="w-5 h-5 rounded-full bg-gray-300 text-white text-xs leading-none">×</button>
          </span>
        ))}
      </div>
    </Section>
  );
}
/* 並び順を変えられるリスト（項目カテゴリ用：▲▼で並べ替え） */
function OrderedListEditor({ title, items, onChange, placeholder, note }) {
  const [v, setV] = useState('');
  const add = () => { const t = v.trim(); if (!t || items.includes(t)) { setV(''); return; } onChange([...items, t]); setV(''); };
  const move = (i, d) => { const j = i + d; if (j < 0 || j >= items.length) return; const a = [...items]; [a[i], a[j]] = [a[j], a[i]]; onChange(a); };
  return (
    <Section title={title}>
      {note && <p className="text-xs text-gray-400 mb-2">{note}</p>}
      <div className="flex gap-2 mb-3">
        <input value={v} onChange={e => setV(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()} placeholder={placeholder} className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        <button onClick={add} className="bg-gray-900 text-white rounded-lg px-4 text-sm font-bold">追加</button>
      </div>
      <div className="space-y-2">
        {items.length === 0 && <span className="text-xs text-gray-400">未登録</span>}
        {items.map((n, i) => (
          <div key={n} className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
            <span className="text-gray-400 text-xs w-5 text-center">{i + 1}</span>
            <span className="flex-1 text-sm truncate">{n}</span>
            <button onClick={() => move(i, -1)} disabled={i === 0} className="w-7 h-7 rounded border border-gray-300 text-gray-600 disabled:opacity-30">▲</button>
            <button onClick={() => move(i, 1)} disabled={i === items.length - 1} className="w-7 h-7 rounded border border-gray-300 text-gray-600 disabled:opacity-30">▼</button>
            <button onClick={() => onChange(items.filter((_, x) => x !== i))} className="text-red-500 text-xs px-1">削除</button>
          </div>
        ))}
      </div>
    </Section>
  );
}

/* 店舗ごとの定番項目（作成時にその店舗の上部へ「★定番」として表示） */
function StoreDefaultsEditor({ stores, categories, value, onChange }) {
  const [sel, setSel] = useState(stores[0] || '');
  useEffect(() => { if (!stores.includes(sel)) setSel(stores[0] || ''); }, [stores]);
  if (!stores.length) return <Section title="店舗ごとの定番項目"><p className="text-xs text-gray-400">先に店舗を登録してください。</p></Section>;
  const cur = value[sel] || [];
  const toggle = c => { const next = cur.includes(c) ? cur.filter(x => x !== c) : [...cur, c]; onChange({ ...value, [sel]: next }); };
  return (
    <Section title="店舗ごとの定番項目">
      <p className="text-xs text-gray-400 mb-2">店舗を選び、よくやる項目をオンにすると、作成時にその店舗の上部へ「★定番」としてまとめて表示されます。</p>
      <select value={sel} onChange={e => setSel(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3">
        {stores.map(s => <option key={s} value={s}>{s}</option>)}
      </select>
      <div className="flex flex-wrap gap-2">
        {categories.length === 0 && <span className="text-xs text-gray-400">先に項目カテゴリを登録してください。</span>}
        {categories.map(c => (
          <button key={c} onClick={() => toggle(c)} className={`px-3 py-1.5 rounded-full text-sm border ${cur.includes(c) ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-gray-700 border-gray-300'}`}>{cur.includes(c) ? '★ ' : ''}{c}</button>
        ))}
      </div>
    </Section>
  );
}

/* ---------- 作成中（下書き）タブ ---------- */
function DraftsTab({ onResume, onDelete }) {
  const [draft, setDraft] = useState(() => load('draft', null));
  const usedItems = draft && Array.isArray(draft.items)
    ? draft.items.filter(it => ((it.before && it.before.length) || (it.after && it.after.length)))
    : [];
  const hasContent = draft && (draft.store || (draft.staff && draft.staff.length) || usedItems.length || draft.note);

  if (!hasContent) {
    return <div className="max-w-xl mx-auto px-4 py-16 text-center text-gray-400 text-sm">作成中の報告書はありません。</div>;
  }
  const remove = () => { if (confirm('作成中の下書きを削除しますか？')) { onDelete(); setDraft(null); } };
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-3 pb-safe">
      <div className="bg-white rounded-xl border border-amber-300 shadow-sm p-4">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-[11px] font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full">作成中</span>
          <span className="text-xs text-gray-400">自動保存されています</span>
        </div>
        <div className="font-bold text-base">{draft.store || '（店舗未選択）'}</div>
        <div className="text-xs text-gray-500 mt-0.5">{draft.date ? fmtDate(draft.date) : '-'} ・ {(draft.staff || []).join('、') || '担当未選択'}</div>
        <div className="text-xs text-gray-500 mt-1">
          {usedItems.length > 0 ? `作業 ${usedItems.length} 件：${usedItems.map(i => i.category).join('、')}` : '作業未入力'}
        </div>
        {draft.note && <div className="text-xs text-gray-500 mt-1 truncate">特記：{draft.note}</div>}
        <div className="flex gap-2 mt-4">
          <button onClick={onResume} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl py-3 text-sm">続きから編集</button>
          <button onClick={remove} className="bg-white border border-red-300 text-red-500 font-bold rounded-xl px-5 text-sm">削除</button>
        </div>
      </div>
    </div>
  );
}

function SettingsTab({ masters, setMasters }) {
  return (
    <div className="max-w-xl mx-auto px-4 py-4 space-y-4 pb-safe">
      <ListEditor title="担当者" items={masters.staff} placeholder="担当者名" onChange={v => setMasters(m => ({ ...m, staff: v }))} />
      <ListEditor title="店舗" items={masters.stores} placeholder="店舗名" onChange={v => setMasters(m => ({ ...m, stores: v }))} />
      <OrderedListEditor title="項目カテゴリ" items={masters.categories} placeholder="カテゴリ名" note="作成画面ではこの順番で表示されます（▲▼で並べ替え）。" onChange={v => setMasters(m => ({ ...m, categories: v }))} />
      <StoreDefaultsEditor stores={masters.stores} categories={masters.categories} value={masters.storeDefaults || {}} onChange={v => setMasters(m => ({ ...m, storeDefaults: v }))} />
      {LINE_ENABLED
        ? <p className="text-xs text-gray-400 px-1">LINE自動送信：有効（完了時にGAS経由で送信）。データは端末内（localStorage）に保存されます。</p>
        : <p className="text-xs text-gray-400 px-1">ローカル保存モード。完了時のLINE自動送信を使うには index.html 上部の GAS_URL を設定してください（未設定でもPDFの共有/保存は使えます）。</p>}
    </div>
  );
}

function Section({ title, right, children }) {
  return (
    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div className="flex items-center justify-between mb-3"><h2 className="text-sm font-bold text-gray-700">{title}</h2>{right}</div>
      {children}
    </div>
  );
}

/* ---------- アプリ本体 ---------- */
function App() {
  const [tab, setTab] = useState('create');
  // 保存済みに初期値を足し込む（空保存・新しい端末・初期値追加すべてに対応）
  const mergeDefaults = (saved, defaults) => {
    const arr = Array.isArray(saved) ? saved.slice() : [];
    defaults.forEach(d => { if (!arr.includes(d)) arr.push(d); });
    return arr;
  };
  const [masters, setMasters] = useState(() => ({
    staff: mergeDefaults(load('staff', []), DEFAULT_STAFF),
    stores: mergeDefaults(load('stores', []), DEFAULT_STORES),
    categories: mergeDefaults(load('categories', []), DEFAULT_CATEGORIES),
    storeDefaults: load('storeDefaults', {}), // { 店舗名: [定番カテゴリ,...] }
  }));
  const [reports, setReports] = useState(() => load('reports', []));

  useEffect(() => { save('staff', masters.staff); save('stores', masters.stores); save('categories', masters.categories); save('storeDefaults', masters.storeDefaults); }, [masters]);
  useEffect(() => save('reports', reports), [reports]);

  const addReport = r => setReports(arr => [r, ...arr]);
  const delReport = id => setReports(arr => arr.filter(r => r.id !== id));

  const tabs = [['create', '作成', '📝'], ['drafts', '作成中', '📋'], ['history', '履歴', '🗂'], ['settings', '設定', '⚙️']];
  const deleteDraft = () => { try { localStorage.removeItem('ssr_draft'); } catch {} };
  return (
    <div className="min-h-screen">
      <header className="bg-white border-b border-gray-200 sticky top-0 z-20">
        <div className="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="font-bold flex items-center gap-2"><span>🧰</span>店舗サポート 報告書</div>
        </div>
      </header>

      {tab === 'create' && <CreateTab masters={masters} onDone={addReport} />}
      {tab === 'drafts' && <DraftsTab onResume={() => setTab('create')} onDelete={deleteDraft} />}
      {tab === 'history' && <HistoryTab reports={reports} masters={masters} onDelete={delReport} />}
      {tab === 'settings' && <SettingsTab masters={masters} setMasters={setMasters} />}

      <nav className="fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 z-20 nav-safe">
        <div className="max-w-xl mx-auto grid grid-cols-4">
          {tabs.map(([k, label, icon]) => (
            <button key={k} onClick={() => setTab(k)} className={`py-2.5 flex flex-col items-center gap-0.5 text-xs ${tab === k ? 'text-emerald-600 font-bold' : 'text-gray-400'}`}>
              <span className="text-lg leading-none">{icon}</span>{label}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

function Root() {
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
